<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft DP-900 Practice Quiz</title>
    <style>
        :root {
            --primary: #0078d4;
            --primary-dark: #005a9e;
            --success: #107c41;
            --error: #a80000;
            --background: #f3f2f1;
            --card-bg: #ffffff;
            --surface: #faf9f8;
            --text: #323130;
            --muted: #605e5c;
            --border: #e1dfdd;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef5fb 0%, var(--background) 30%, #f7f7f5 100%);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            background: rgba(255,255,255,0.95);
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--primary-dark);
        }

        .timer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .timer-bar.warning { color: var(--error); border-color: var(--error); }

        .timer-bar button {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .progress-info {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .progress-info span { font-weight: 700; color: var(--text); }

        .progress-bar-track {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .nav-btn {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            position: relative;
        }

        .nav-btn:hover { border-color: var(--primary); }
        .nav-btn.current { background: var(--primary); color: #fff; border-color: var(--primary); }
        .nav-btn.answered { background: #dff6dd; border-color: var(--success); }
        .nav-btn.flagged::after {
            content: '\2691';
            position: absolute;
            top: -4px;
            right: -2px;
            font-size: 0.6rem;
            color: var(--error);
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: auto;
        }

        .sidebar-actions button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }

        .btn-submit { background: var(--primary); color: #fff; }
        .btn-submit:hover { background: var(--primary-dark); }

        .btn-clear { background: #fff; color: var(--error); border: 1px solid var(--error) !important; }
        .btn-clear:hover { background: #fde7e9; }

        .main-content {
            padding: 24px;
            max-width: 900px;
        }

        header {
            display: grid;
            gap: 10px;
            text-align: center;
            margin-bottom: 24px;
            padding: 28px 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 120, 212, 0.15);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(37, 39, 44, 0.08);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            letter-spacing: -0.02em;
            color: #0f172a;
        }

        header p { margin: 0; color: var(--muted); font-size: 0.95rem; }

        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        .toolbar .meta { color: var(--muted); font-size: 0.95rem; }

        .toolbar .filter { display: flex; gap: 8px; flex-wrap: wrap; }

        .chip {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.15s ease;
        }

        .chip:hover { transform: translateY(-1px); border-color: rgba(0, 120, 212, 0.35); }

        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(37, 39, 44, 0.06);
        }

        .question-card.hidden { display: none; }

        .question-card.current-q { border: 2px solid var(--primary); }

        .question-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: baseline;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .question-header h2 { margin: 0; font-size: 1.1rem; color: var(--primary-dark); }

        .question-badges { display: flex; gap: 8px; flex-wrap: wrap; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            background: #eef6ff;
            color: var(--primary-dark);
            border: 1px solid rgba(0, 120, 212, 0.15);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .badge.secondary { background: #f5f5f4; color: var(--muted); border-color: var(--border); }

        .badge.flag-badge { background: #fde7e9; color: var(--error); border-color: rgba(168,0,0,0.3); cursor: pointer; }

        .question-text { font-size: 1.03rem; margin-bottom: 16px; white-space: pre-wrap; }

        .source-toggle {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .source-toggle button {
            background: transparent;
            color: var(--primary-dark);
            border: 1px solid rgba(0, 120, 212, 0.25);
            padding: 8px 12px;
        }

        .source-toggle button:hover { background: rgba(0, 120, 212, 0.08); }

        .source-panel {
            display: none;
            margin-top: 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fafafa;
        }

        .source-panel img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .source-panel p { margin: 10px 0 0; color: var(--muted); font-size: 0.92rem; }

        .options { display: grid; gap: 10px; }

        .option-label {
            display: block;
            background: var(--surface);
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }

        .option-label:hover { background: #e9f3fb; border-color: rgba(0, 120, 212, 0.18); }
        .option-label input { margin-right: 10px; }

        .inline-select {
            min-width: min(100%, 360px);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.96rem;
            background: white;
        }

        .statement-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .statement-table th,
        .statement-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .statement-table th { background: #f8fafc; }

        .drag-layout {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 16px;
            margin-top: 12px;
        }

        .pool-box, .match-box {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: #fafafa;
        }

        .pool-box h3, .match-box h3 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--primary-dark);
        }

        .draggable-item {
            background: var(--primary);
            color: white;
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: grab;
            user-select: none;
            font-weight: 600;
        }

        .drop-zone-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6px;
        }

        .drop-zone-table th,
        .drop-zone-table td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        .drop-target {
            min-height: 44px;
            border: 2px dashed #a19f9d;
            border-radius: 10px;
            padding: 6px;
            background: #fff;
        }

        .drop-target .draggable-item { margin: 0; }

        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 700;
        }

        button:hover { background: var(--primary-dark); }

        .feedback {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            display: none;
            font-weight: 700;
        }

        .feedback.correct { display: block; background: #dff6dd; color: var(--success); border: 1px solid rgba(16, 124, 65, 0.3); }
        .feedback.incorrect { display: block; background: #fde7e9; color: var(--error); border: 1px solid rgba(168, 0, 0, 0.3); }

        .explanation {
            display: none;
            margin-top: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #eef6ff;
            color: var(--primary-dark);
            border: 1px solid rgba(0,120,212,0.2);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .flag-btn {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.82rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .flag-btn:hover { color: var(--error); border-color: var(--error); }
        .flag-btn.flagged { color: var(--error); border-color: var(--error); background: #fde7e9; }

        .results-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .results-overlay.show { display: flex; }

        .results-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }

        .results-card h2 { margin: 0 0 8px; font-size: 1.8rem; }
        .results-card .score-big { font-size: 3.5rem; font-weight: 800; margin: 16px 0; }
        .results-card .score-big.pass { color: var(--success); }
        .results-card .score-big.fail { color: var(--error); }
        .results-card p { color: var(--muted); margin: 4px 0; }

        .results-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .results-breakdown .stat {
            padding: 12px;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .results-breakdown .stat .label { font-size: 0.8rem; color: var(--muted); }
        .results-breakdown .stat .value { font-size: 1.3rem; font-weight: 700; }

        .results-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        .json-block {
            white-space: pre;
            background: #1e293b;
            color: #e2e8f0;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.88rem;
            line-height: 1.5;
            overflow-x: auto;
        }

        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; }
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: auto;
                max-height: 45vh;
                border-right: none;
                border-top: 1px solid var(--border);
                z-index: 100;
                flex-direction: row;
                flex-wrap: wrap;
                overflow-y: auto;
                padding: 10px;
                gap: 8px;
            }
            .sidebar h3, .timer-bar, .progress-info, .progress-bar-track { display: none; }
            .nav-grid { grid-template-columns: repeat(10, 1fr); width: 100%; }
            .sidebar-actions { flex-direction: row; width: 100%; margin-top: 0; }
            .sidebar-actions button { flex: 1; }
            .main-content { padding: 14px; padding-bottom: 120px; }
            .drag-layout { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .question-card { padding: 16px; }
            .question-header { align-items: flex-start; flex-direction: column; }
            .statement-table th, .statement-table td { padding: 10px; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <h3>DP-900 Exam</h3>
        <div class="timer-bar" id="timer-bar">
            <span id="timer-display">45:00</span>
            <button type="button" id="timer-toggle" onclick="toggleTimer()">Pause</button>
        </div>
        <div class="progress-info">
            <span id="answered-count">0</span> / <span id="total-count">0</span> answered
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="nav-grid" id="nav-grid"></div>
        <div class="sidebar-actions">
            <button type="button" class="btn-submit" onclick="submitQuiz()">Submit Exam</button>
            <button type="button" class="btn-clear" onclick="clearAll()">Reset All</button>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Microsoft DP-900 Practice Platform</h1>
            <p>Timed exam simulation. Answer all questions, then submit for your score.</p>
        </header>

        <div class="toolbar">
            <div class="meta" id="quiz-meta">Loading questions...</div>
            <div class="filter" id="type-filters"></div>
        </div>

        <div id="quiz-root"></div>
    </main>
</div>

<div class="results-overlay" id="results-overlay">
    <div class="results-card">
        <h2 id="results-title">Exam Complete</h2>
        <div class="score-big" id="results-score">0%</div>
        <p id="results-msg"></p>
        <div class="results-breakdown">
            <div class="stat"><div class="label">Correct</div><div class="value" id="r-correct">0</div></div>
            <div class="stat"><div class="label">Incorrect</div><div class="value" id="r-incorrect">0</div></div>
            <div class="stat"><div class="label">Unanswered</div><div class="value" id="r-unanswered">0</div></div>
            <div class="stat"><div class="label">Time Taken</div><div class="value" id="r-time">0m</div></div>
        </div>
        <div class="results-actions">
            <button type="button" onclick="reviewAnswers()">Review Answers</button>
            <button type="button" class="btn-clear" onclick="retakeQuiz()" style="background:var(--error);color:#fff;border:none;">Retake</button>
        </div>
    </div>
</div>

                            <tr><td><div class="drop-target" id="q13-target3" data-match="Azure Synapse Analytics" ondrop="drop(event)" ondragover="allowDrop(event)"></div></td><td>Persist a tabular representation of data stored in Parquet format.</td></tr>
                        </tbody></table>
                    </div>
                </div>${buildSourcePanel(q)}
                <div class="actions"><button type="button" onclick="checkDragDrop('q${id}')">Submit Match</button></div>
                <div class="feedback"></div><div class="explanation"></div>`;
        }
        const md = matchData[id];
        if (md) {
            const correctItems = md.targets.map(t => t[1]);
            const uniqueItems = [...new Set(correctItems)];
            const shuffledItems = shuffle(uniqueItems);
            let itemCounter = 0;
            const itemHtml = shuffledItems.map(item => {
                itemCounter++;
                return `<div class="draggable-item" draggable="true" ondragstart="drag(event)" id="q${id}-i${itemCounter}">${escapeHtml(item)}</div>`;
            }).join('');
            const targetHtml = md.targets.map((t, i) => {
                return `<tr><td>${escapeHtml(t[0])}</td><td><div class="drop-target" id="q${id}-target${i+1}" data-match="${escapeHtml(t[1])}" ondrop="drop(event)" ondragover="allowDrop(event)"></div></td></tr>`;
            }).join('');
            return `<div class="question-text">Match the items from the left to the correct targets on the right.</div>
                <div class="drag-layout">
                    <div class="pool-box"><h3>${escapeHtml(md.pool)}</h3>${itemHtml}</div>
                    <div class="match-box"><h3>Scenarios</h3><table class="drop-zone-table"><thead><tr><th>Description</th><th>Target</th></tr></thead><tbody>${targetHtml}</tbody></table></div>
                </div>${buildSourcePanel(q)}
                <div class="actions"><button type="button" onclick="checkDragDrop('q${id}')">Submit Match</button></div>
                <div class="feedback"></div><div class="explanation"></div>`;
        }
        return `<div class="question-text">${escapeHtml(q.questionText)}</div>
            <div class="feedback" style="display:block;background:#fff3cd;color:#856404;border:1px solid #ffc107;">This match question requires the source PDF exhibit. Use "Toggle source page" to view the original.</div>
            ${buildSourcePanel(q)}`;
    }

    function buildQuestionCard(q) {
        const id = getQuestionId(q);
        let body = '';
        if (q.type === 'mcq') body = buildMcq(q);
        else if (q.type === 'dropdown') body = buildDropdown(q);
        else if (q.type === 'yesno') body = buildYesNo(q);
        else if (q.type === 'match') body = buildMatch(q);
        return `<section class="question-card" data-type="${q.type}" data-qid="${id}" id="q${id}">${buildHeader(q)}${body}</section>`;
    }

    function toggleSource(id) {
        const p = document.getElementById(id);
        if (!p) return;
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) { ev.dataTransfer.setData('text', ev.target.id); }

    function drop(ev) {
        ev.preventDefault();
        const data = ev.dataTransfer.getData('text');
        const el = document.getElementById(data);
        if (!el) return;
        if (ev.target.classList.contains('drop-target')) {
            ev.target.appendChild(el);
        }
    }

    function markAnswered(id) {
        if (!questionStates[id]) questionStates[id] = { answered: false, flagged: false, userAnswer: null };
        questionStates[id].answered = true;
        updateNav();
        updateProgress();
        saveState();
    }

    function checkMCQ(cardId, correctVal) {
        const card = document.getElementById(cardId);
        const selected = [...card.querySelectorAll(`input[name="${cardId}-opt"]:checked`)];
        const fb = card.querySelector('.feedback');
        const exp = card.querySelector('.explanation');
        const correct = Array.isArray(correctVal) ? correctVal : [correctVal];
        const id = parseInt(cardId.replace('q',''));

        if (!selected.length) { alert(correct.length > 1 ? 'Please choose all correct answers first.' : 'Please choose an answer first.'); return; }

        const sel = selected.map(i => i.value).sort();
        const expc = correct.map(v => String(v)).sort();
        const ok = sel.length === expc.length && sel.every((v,i) => v === expc[i]);

        fb.style.display = 'block';
        fb.className = 'feedback ' + (ok ? 'correct' : 'incorrect');
        fb.innerText = ok ? 'Correct! Well done.' : (correct.length > 1 ? `Incorrect. The correct answers are ${expc.join(', ')}.` : `Incorrect. The correct answer is option ${expc[0]}.`);

        if (exp) {
            const explanation = getExplanation(id);
            if (explanation) { exp.style.display = 'block'; exp.innerText = explanation; }
        }
        markAnswered(id);
    }

    function checkInline(cardId) {
        const card = document.getElementById(cardId);
        const sel = card.querySelector('select');
        const fb = card.querySelector('.feedback');
        const exp = card.querySelector('.explanation');
        const id = parseInt(cardId.replace('q',''));

        if (sel.value === '') { alert('Please pick an option from the menu.'); return; }

        const expected = sel.getAttribute('data-correct');
        const ok = sel.value === expected;
        fb.style.display = 'block';
        fb.className = 'feedback ' + (ok ? 'correct' : 'incorrect');
        fb.innerText = ok ? 'Correct!' : 'Incorrect choice. Please try again.';

        if (exp) {
            const explanation = getExplanation(id);
            if (explanation) { exp.style.display = 'block'; exp.innerText = explanation; }
        }
        markAnswered(id);
    }

    function checkMultiDropdown(cardId) {
        const card = document.getElementById(cardId);
        const sels = card.querySelectorAll('.multi-ans');
        const fb = card.querySelector('.feedback');
        const exp = card.querySelector('.explanation');
        const id = parseInt(cardId.replace('q',''));
        let ok = true;
        sels.forEach(s => { if (s.value !== s.getAttribute('data-correct')) ok = false; });

        fb.style.display = 'block';
        fb.className = 'feedback ' + (ok ? 'correct' : 'incorrect');
        fb.innerText = ok ? 'Correct!' : 'One or more selections are not correct.';

        if (exp) {
            const explanation = getExplanation(id);
            if (explanation) { exp.style.display = 'block'; exp.innerText = explanation; }
        }
        markAnswered(id);
    }

    function checkMatrix(cardId) {
        const card = document.getElementById(cardId);
        const rows = card.querySelectorAll('.stmt-row');
        const fb = card.querySelector('.feedback');
        const exp = card.querySelector('.explanation');
        const id = parseInt(cardId.replace('q',''));
        let correct = 0;
        rows.forEach(r => { if (r.querySelector('select').value === r.getAttribute('data-ans')) correct++; });

        fb.style.display = 'block';
        fb.className = 'feedback ' + (correct === rows.length ? 'correct' : 'incorrect');
        fb.innerText = correct === rows.length ? 'Correct!' : `You correctly identified ${correct} out of ${rows.length} statements.`;

        if (exp) {
            const explanation = getExplanation(id);
            if (explanation) { exp.style.display = 'block'; exp.innerText = explanation; }
        }
        markAnswered(id);
    }

    function checkDragDrop(cardId) {
        const card = document.getElementById(cardId);
        const targets = card.querySelectorAll('.drop-target');
        const fb = card.querySelector('.feedback');
        const exp = card.querySelector('.explanation');
        const id = parseInt(cardId.replace('q',''));
        let mistake = false;
        targets.forEach(t => {
            if (t.children.length === 0) { mistake = true; return; }
            if (t.children[0].innerText.trim() !== t.getAttribute('data-match')) mistake = true;
        });

        fb.style.display = 'block';
        fb.className = 'feedback ' + (mistake ? 'incorrect' : 'correct');
        fb.innerText = mistake ? 'Incorrect allocations. Drag elements back and try again.' : 'Perfect Match!';

        if (exp) {
            const explanation = getExplanation(id);
            if (explanation) { exp.style.display = 'block'; exp.innerText = explanation; }
        }
        markAnswered(id);
    }

    function getExplanation(id) {
        const explanations = {
            7: 'Read-only replicas are used to offload read workloads such as analytics and reporting from the write replica.',
            11: 'Azure SQL Database firewall rules control access by client IP address, so a changed external IP must be added to the allow list.',
            12: 'Internet-connected temperature sensor trend analysis is a time-series scenario.',
            69: 'Multi-write and read regions are configured at the Cosmos DB account level.',
            71: 'Azure SQL Database is the recommended PaaS option for OLTP workloads.',
            82: 'A bar chart showing YTD sales by region is descriptive analytics (what happened).',
            84: 'A view persists a SQL query so other users can reference it.',
            87: 'Reading from a data warehouse for QA is Online Analytical Processing (OLAP).',
            88: 'Data visualization represents trends over time and communicates the significance of data.',
            104: 'Azure Private Link provides private connectivity from a VM to Azure SQL without internet exposure.',
            121: 'Azure Files provides SMB/NFS file shares that can be mapped as network drives.',
            122: 'An integration runtime provides the compute environment for ADF activities.',
        };
        return explanations[id] || null;
    }

    function toggleFlag(id) {
        if (!questionStates[id]) questionStates[id] = { answered: false, flagged: false };
        questionStates[id].flagged = !questionStates[id].flagged;
        const card = document.getElementById('q' + id);
        if (card) {
            const btn = card.querySelector('.flag-btn');
            if (btn) {
                btn.classList.toggle('flagged', questionStates[id].flagged);
                btn.innerText = questionStates[id].flagged ? '\u2691 Flagged' : '\u2691 Flag';
            }
        }
        updateNav();
        saveState();
    }

    function applyFilter(type) {
        activeFilter = type;
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.type === type));
        document.querySelectorAll('.question-card').forEach(c => {
            c.classList.toggle('hidden', type !== 'all' && c.dataset.type !== type);
        });
    }

    function renderFilters() {
        const root = document.getElementById('type-filters');
        root.innerHTML = typePriority.map(t => `<button class="chip${t==='all'?' active':''}" type="button" data-type="${t}" onclick="applyFilter('${t}')">${t==='all'?'All':typeLabels[t]}</button>`).join('');
    }

    function buildNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = questions.map(q => {
            const id = getQuestionId(q);
            return `<button type="button" class="nav-btn" data-qid="${id}" onclick="scrollToQuestion(${id})">${id}</button>`;
        }).join('');
    }

    function scrollToQuestion(id) {
        const el = document.getElementById('q' + id);
        if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.question-card.current-q').forEach(c => c.classList.remove('current-q'));
            el.classList.add('current-q');
            currentQuestionId = id;
        }
    }

    function updateNav() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            const id = parseInt(btn.dataset.qid);
            const state = questionStates[id];
            btn.classList.toggle('answered', state?.answered);
            btn.classList.toggle('flagged', state?.flagged);
            btn.classList.toggle('current', id === currentQuestionId);
        });
    }

    function updateProgress() {
        const total = questions.length;
        const answered = questions.filter(q => questionStates[getQuestionId(q)]?.answered).length;
        document.getElementById('answered-count').textContent = answered;
        document.getElementById('total-count').textContent = total;
        document.getElementById('progress-fill').style.width = (total ? (answered/total*100) : 0) + '%';
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function startTimer() {
        if (timerRunning) return;
        timerRunning = true;
        document.getElementById('timer-toggle').textContent = 'Pause';
        timerInterval = setInterval(() => {
            timerSeconds--;
            document.getElementById('timer-display').textContent = formatTime(timerSeconds);
            if (timerSeconds <= 300) document.getElementById('timer-bar').classList.add('warning');
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                timerRunning = false;
                submitQuiz();
            }
        }, 1000);
    }

    function toggleTimer() {
        if (timerRunning) {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('timer-toggle').textContent = 'Resume';
        } else {
            startTimer();
        }
    }

    function submitQuiz() {
        if (examSubmitted) return;
        const answered = questions.filter(q => questionStates[getQuestionId(q)]?.answered).length;
        const total = questions.length;
        if (answered < total && !confirm(`You have answered ${answered} of ${total} questions. Submit anyway?`)) return;

        examSubmitted = true;
        clearInterval(timerInterval);
        timerRunning = false;

        let correct = 0, incorrect = 0, unanswered = 0;
        questions.forEach(q => {
            const id = getQuestionId(q);
            const state = questionStates[id];
            if (!state?.answered) { unanswered++; return; }
            const key = answerKeyByNumber[id];
            if (!key) { incorrect++; return; }
            const correctVals = (key.values || []).sort().join(',');
            let userAns = '';
            const card = document.getElementById('q' + id);
            if (!card) { incorrect++; return; }

            if (q.type === 'mcq') {
                const checked = [...card.querySelectorAll(`input[name="q${id}-opt"]:checked`)].map(i => i.value).sort().join(',');
                userAns = checked;
            } else if (q.type === 'dropdown') {
                const selects = card.querySelectorAll('.multi-ans');
                if (selects.length) {
                    userAns = [...selects].map(s => s.value).sort().join(',');
                } else {
                    const sel = card.querySelector('select');
                    userAns = sel ? sel.value : '';
                }
            } else if (q.type === 'yesno') {
                const selvals = [...card.querySelectorAll('.stmt-row select')].map(s => s.value);
                userAns = selvals.join(',');
            } else {
                userAns = 'submitted';
            }

            const correctJoined = correctVals;
            if (userAns === correctJoined || (q.type === 'match' && userAns === 'submitted')) {
                if (q.type === 'match') { correct++; return; }
                correct++;
            } else {
                incorrect++;
            }
        });

        const totalScored = correct + incorrect;
        const pct = totalScored > 0 ? Math.round(correct / totalScored * 100) : 0;
        const elapsed = TIMER_MINUTES * 60 - timerSeconds;
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;

        document.getElementById('results-title').textContent = pct >= 70 ? 'Congratulations!' : 'Exam Complete';
        document.getElementById('results-score').textContent = pct + '%';
        document.getElementById('results-score').className = 'score-big ' + (pct >= 70 ? 'pass' : 'fail');
        document.getElementById('results-msg').textContent = pct >= 70 ? 'You passed! Great job on DP-900 prep.' : 'Keep studying! Review the incorrect answers below.';
        document.getElementById('r-correct').textContent = correct;
        document.getElementById('r-incorrect').textContent = incorrect;
        document.getElementById('r-unanswered').textContent = unanswered;
        document.getElementById('r-time').textContent = `${mins}m ${secs}s`;
        document.getElementById('results-overlay').classList.add('show');
    }

    function reviewAnswers() {
        document.getElementById('results-overlay').classList.remove('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function retakeQuiz() {
        if (!confirm('This will reset all answers and the timer. Continue?')) return;
        localStorage.removeItem('dp900_state');
        location.reload();
    }

    function clearAll() {
        if (!confirm('Reset all answers and the timer?')) return;
        localStorage.removeItem('dp900_state');
        location.reload();
    }

    function saveState() {
        const data = { questionStates, timerSeconds, startTime: startTime?.toISOString() };
        try { localStorage.setItem('dp900_state', JSON.stringify(data)); } catch(e) {}
    }

    function loadState() {
        try {
            const raw = localStorage.getItem('dp900_state');
            if (!raw) return null;
            return JSON.parse(raw);
        } catch(e) { return null; }
    }

    function renderQuiz() {
        questions = window.dp900Questions;
        const root = document.getElementById('quiz-root');
        root.innerHTML = questions.map(buildQuestionCard).join('');
        document.getElementById('quiz-meta').textContent = `${questions.length} questions loaded.`;
        renderFilters();
        buildNav();
        applyFilter('all');

        const saved = loadState();
        if (saved) {
            questionStates = saved.questionStates || {};
            timerSeconds = saved.timerSeconds ?? TIMER_MINUTES * 60;
            document.getElementById('timer-display').textContent = formatTime(timerSeconds);
            if (timerSeconds <= 300) document.getElementById('timer-bar').classList.add('warning');
        }

        startTime = new Date();
        updateProgress();
        updateNav();
        startTimer();
    }

    window.addEventListener('scroll', () => {
        const cards = document.querySelectorAll('.question-card:not(.hidden)');
        let closest = null;
        let minDist = Infinity;
        cards.forEach(c => {
            const rect = c.getBoundingClientRect();
            const dist = Math.abs(rect.top - 200);
            if (dist < minDist) { minDist = dist; closest = c; }
        });
        if (closest) {
            const id = parseInt(closest.dataset.qid);
            if (id !== currentQuestionId) {
                currentQuestionId = id;
                updateNav();
            }
        }
    });

    document.addEventListener('DOMContentLoaded', renderQuiz);
</script>
</body>
</html>
